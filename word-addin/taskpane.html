<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Paper Library</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<style>
  :root{ --accent:#2563eb; --accent-soft:#eaf1ff; --border:#e2e6ee; --text:#1c2430; --text2:#5a6675; --text3:#8a94a3; --bg:#f6f8fb; }
  *{box-sizing:border-box}
  html,body{margin:0; height:100%; font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",sans-serif; color:var(--text); font-size:13px; background:#fff}
  body{display:flex; flex-direction:column}
  header{padding:10px 12px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px}
  header .logo{width:24px;height:24px;flex:0 0 auto;display:block}
  header .t{font-weight:700}
  header .lib{margin-left:auto; font-size:11.5px; color:var(--text3); text-align:right; line-height:1.3}
  header .langBtn{flex:0 0 auto; border:1px solid var(--border); background:#fff; color:var(--text2); border-radius:6px; padding:3px 9px; font-size:11.5px; cursor:pointer}
  header .langBtn:hover{border-color:var(--accent); color:var(--accent)}
  .controls{padding:8px 12px; border-bottom:1px solid var(--border); display:flex; flex-direction:column; gap:7px}
  .row{display:flex; gap:6px; align-items:center; flex-wrap:wrap}
  .row > label{font-size:11.5px; color:var(--text2)}
  select, input[type=search], input[type=text]{ font:inherit; padding:5px 8px; border:1px solid var(--border); border-radius:6px; background:#fff; color:var(--text); outline:none; min-width:0 }
  select:focus, input:focus{border-color:var(--accent)}
  #q{flex:1}
  .fields{display:flex; gap:8px; align-items:flex-end}
  .field{flex:1 1 0; min-width:0; display:flex; flex-direction:column; gap:2px}
  .field > label{font-size:11.5px; color:var(--text2)}
  .field select{width:100%}
  .btn{font:inherit; border:1px solid var(--accent); background:var(--accent); color:#fff; border-radius:6px; padding:5px 10px; cursor:pointer; font-weight:600; white-space:nowrap}
  .btn:hover{filter:brightness(1.07)}
  .btn.ghost{background:#fff; color:var(--accent)}
  .btn.ghost:hover{background:var(--accent-soft)}
  .btn:disabled{opacity:.5; cursor:default}
  .check{display:inline-flex; align-items:center; gap:4px; font-size:11.5px; color:var(--text2)}
  #results{flex:1; overflow-y:auto; padding:6px 8px}
  .card{border:1px solid var(--border); border-radius:8px; padding:8px 10px; margin-bottom:7px; background:#fff}
  .card:hover{border-color:var(--accent)}
  .card .ct{font-weight:600; line-height:1.3; margin-bottom:3px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}
  .card .cau{color:var(--text2); font-size:12px; line-height:1.25; margin-bottom:4px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}
  .card .cmeta{display:flex; flex-wrap:wrap; gap:6px; align-items:center; color:var(--text3); font-size:11.5px; font-weight:600; margin-bottom:7px}
  .card .cmeta .journal{color:var(--accent)}
  .card .acts{display:flex; gap:6px; flex-wrap:wrap}
  .card .acts .btn{padding:5px 10px}
  .empty{color:var(--text3); text-align:center; padding:26px 16px; line-height:1.6}
  .toast{position:fixed; left:50%; bottom:12px; transform:translateX(-50%); background:#1c2430; color:#fff; padding:7px 13px; border-radius:8px; font-size:12px; opacity:0; transition:opacity .2s; pointer-events:none; max-width:88%}
  .toast.show{opacity:.96}
  .toast.err{background:#b42318}
  .hidden{display:none !important}
  a{color:var(--accent)}
</style>
</head>
<body>
  <header>
    <svg class="logo" viewBox="0 0 32 32" fill="none" aria-hidden="true">
      <defs>
        <linearGradient id="plg1" x1="5" y1="7" x2="16" y2="25" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#1d4ed8"/><stop offset="1" stop-color="#60a5fa"/></linearGradient>
        <linearGradient id="plg2" x1="27" y1="7" x2="16" y2="25" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#2563eb"/><stop offset="1" stop-color="#93c5fd"/></linearGradient>
        <linearGradient id="plg3" x1="3" y1="25" x2="29" y2="25" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#bfdbfe"/><stop offset=".5" stop-color="#60a5fa"/><stop offset="1" stop-color="#1d4ed8"/></linearGradient>
      </defs>
      <path d="M16 8.35C13.2 5.95 8.7 5.7 4.75 6.95v16.2c3.95-1.15 8.45-.8 11.25 1.85z" fill="url(#plg1)"/>
      <path d="M16 8.35C18.8 5.95 23.3 5.7 27.25 6.95v16.2c-3.95-1.15-8.45-.8-11.25 1.85z" fill="url(#plg2)"/>
      <path d="M7.8 11.15c1.85-.5 3.7-.48 5.15.06M7.8 14.55c1.85-.5 3.7-.48 5.15.06M19.05 11.15c1.85-.5 3.7-.48 5.15.06M19.05 14.55c1.85-.5 3.7-.48 5.15.06" stroke="#fff" stroke-width="1.05" stroke-linecap="round" opacity=".82"/>
      <path d="M16 8.5v16.25" stroke="#eff6ff" stroke-width="1.25" stroke-linecap="round"/>
      <rect x="3" y="24.25" width="26" height="3.25" rx="1.6" fill="url(#plg3)"/>
      <path d="M5.1 25.9h21.8" stroke="#eff6ff" stroke-width=".7" stroke-linecap="round" opacity=".55"/>
    </svg>
    <span class="t">Paper Library</span>
    <span class="lib" id="libInfo"></span>
    <button class="langBtn" id="btnLang">EN</button>
  </header>

  <div class="controls">
    <div class="row">
      <input type="search" id="q" data-i18n-ph="searchPh">
      <button class="btn ghost" id="btnLoad" data-i18n="loadBtn" data-i18n-title="loadTitle">ライブラリ</button>
      <input type="file" id="file" accept=".json,application/json" class="hidden">
    </div>
    <div class="fields">
      <div class="field">
        <label data-i18n="styleLabel">スタイル</label>
        <select id="style">
          <option value="acs">ACS</option>
          <option value="nature">Nature</option>
          <option value="science">Science</option>
          <option value="rsc">RSC</option>
          <option value="csj">CSJ (Chem. Lett.)</option>
          <option value="gdch">Angew./Wiley (GDCh)</option>
        </select>
      </div>
      <div class="field">
        <label data-i18n="collLabel">コレクション</label>

      </div>
    </div>
    <div class="row">
      <label class="check"><input type="checkbox" id="incTitle"> <span data-i18n="incTitle">タイトル</span></label>
      <label class="check"><input type="checkbox" id="incUrl"> <span data-i18n="incUrl">DOI/URL</span></label>
      <span style="flex:1"></span>
      <span id="count" style="font-size:11.5px;color:var(--text3)"></span>
    </div>
    <div class="row">
      <label data-i18n="numberLabel">番号ーーーー</label>
      <select id="markerStyle">
        <option value="bracket">[1]</option>
        <option value="super" data-i18n="superOpt">上付き ¹</option>
      </select>
      <span style="flex:1"></span>
      <button class="btn ghost" id="btnRefresh" data-i18n="refreshBtn" data-i18n-title="refreshTitle">文献リストを更新</button>
    </div>
  </div>

  <div id="results"></div>
  <div class="toast" id="toast"></div>

<script>
/* ================================================================
   Citation engine — ported from Paper Library (index.html) so the
   inserted citations match the app exactly. Keep in sync if the app's
   citation logic changes.
================================================================ */
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function normalizeRange(s){ return String(s||'').replace(/\s*[-–—]+\s*/g, '–'); }
function normalizeJournalKey(s){
  return String(s||'').toLowerCase().replace(/[–—-]/g,' ').replace(/&/g,'and').replace(/\bthe\b/g,' ')
    .replace(/[^a-z0-9]+/g,' ').replace(/\s+/g,' ').trim();
}
const JOURNAL_ABBR = new Map([
  ['journal of the american chemical society','J. Am. Chem. Soc.'],['nature materials','Nat. Mater.'],
  ['nature chemistry','Nat. Chem.'],['nature catalysis','Nat. Catal.'],
  ['angewandte chemie international edition','Angew. Chem. Int. Ed.'],['chemistry - a european journal','Chem. Eur. J.'],
  ['chemistry a european journal','Chem. Eur. J.'],['chemical science','Chem. Sci.'],['chemical communications','Chem. Commun.'],
  ['chemistry letters','Chem. Lett.'],['journal of materials chemistry a','J. Mater. Chem. A'],
  ['journal of materials chemistry b','J. Mater. Chem. B'],['journal of materials chemistry c','J. Mater. Chem. C'],
  ['energy & environmental science','Energy Environ. Sci.'],['acs catalysis','ACS Catal.'],['acs energy letters','ACS Energy Lett.'],
  ['acs materials letters','ACS Mater. Lett.'],['acs nano','ACS Nano'],['nano letters','Nano Lett.'],
  ['chemistry of materials','Chem. Mater.'],['inorganic chemistry','Inorg. Chem.'],['organic letters','Org. Lett.'],
  ['the journal of organic chemistry','J. Org. Chem.'],['journal of organic chemistry','J. Org. Chem.'],
  ['organometallics','Organometallics'],['dalton transactions','Dalton Trans.'],
  ['physical chemistry chemical physics','Phys. Chem. Chem. Phys.'],['journal of physical chemistry letters','J. Phys. Chem. Lett.'],
  ['the journal of physical chemistry letters','J. Phys. Chem. Lett.'],['journal of physical chemistry c','J. Phys. Chem. C'],
  ['the journal of physical chemistry c','J. Phys. Chem. C'],['journal of physical chemistry b','J. Phys. Chem. B'],
  ['the journal of physical chemistry b','J. Phys. Chem. B'],['journal of chemical physics','J. Chem. Phys.'],
  ['the journal of chemical physics','J. Chem. Phys.'],['advanced materials','Adv. Mater.'],
  ['advanced energy materials','Adv. Energy Mater.'],['advanced functional materials','Adv. Funct. Mater.'],
  ['advanced science','Adv. Sci.'],['materials horizons','Mater. Horiz.'],['small','Small'],
]);
const JOURNAL_ABBR_NORMALIZED = new Map(Array.from(JOURNAL_ABBR, ([k,v])=>[normalizeJournalKey(k), v]));
function mappedJournalAbbr(s){ return JOURNAL_ABBR_NORMALIZED.get(normalizeJournalKey(s)) || ''; }
function journalDisplay(item){
  const j = item.journal || '';
  return mappedJournalAbbr(j) || mappedJournalAbbr(item.journalAbbr) || item.journalAbbr || j;
}
function citationStyleKey(style){
  if(style==='wiley' || style==='angew') return 'gdch';
  if(style==='jcs') return 'csj';
  return style || 'acs';
}
function authorName(a, style){
  style = citationStyleKey(style);
  const ini = (a.given||'').split(/[\s.]+/).filter(Boolean).map(x=>x[0].toUpperCase()+'.').join(' ');
  if(style==='nature' || style==='rsc' || style==='gdch' || style==='csj' || style==='science'){
    return [ini, a.family].filter(Boolean).join(' ');
  }
  return ini ? `${a.family}, ${ini}` : a.family;
}
function joinCitationAuthors(names, style){
  style = citationStyleKey(style); names = names.filter(Boolean);
  if(!names.length) return '';
  if(style==='acs') return names.join('; ');
  if(style==='rsc'){
    if(names.length===1) return names[0];
    if(names.length===2) return names[0] + ' and ' + names[1];
    return names.slice(0,-1).join(', ') + ', and ' + names[names.length-1];
  }
  if(style==='nature'){
    if(names.length===1) return names[0];
    if(names.length===2) return names[0] + ' & ' + names[1];
    return names.slice(0,-1).join(', ') + ' & ' + names[names.length-1];
  }
  return names.join(', ');
}
function citationTextToAuthors(text){
  return String(text||'').split(';').map(s=>s.trim()).filter(Boolean).map(name=>{
    if(name.includes(',')){ const p = name.split(','); return {family:(p[0]||'').trim(), given:p.slice(1).join(',').trim()}; }
    const p = name.split(/\s+/).filter(Boolean); return {family:p.pop()||'', given:p.join(' ')};
  });
}
function citationAuthors(item, opts){
  let list = item.authors || []; const style = citationStyleKey(opts.style);
  if(opts.authorScope==='corresponding' && item.correspondingAuthors){
    const corrAuthors = citationTextToAuthors(item.correspondingAuthors); const nCorr = corrAuthors.length;
    const corr = joinCitationAuthors(corrAuthors.map(a=>authorName(a, style)), style);
    return corr + (list.length > nCorr ? ' et al.' : '');
  }
  if(opts.authorScope==='first'){
    const first = list[0] ? authorName(list[0], style) : '';
    return first && list.length > 1 ? first + ' et al.' : first;
  }
  return joinCitationAuthors(list.map(a=>authorName(a, style)), style);
}
function sentenceEnd(s){ return s ? s.replace(/\.+$/,'') + '. ' : ''; }
function citationAuthorsHtml(item, opts){ return esc(citationAuthors(item, opts)).replace(/\bet al\./g, '<i>et al.</i>'); }
function itemToCitationHtml(item, opts){
  opts = Object.assign({style:'acs', includeTitle:true, authorScope:'all', includeUrl:true}, opts || {});
  const style = citationStyleKey(opts.style);
  const auth = citationAuthorsHtml(item, opts);
  const title = opts.includeTitle && item.title ? esc(item.title.replace(/\.?$/, '.')) : '';
  const journal = journalDisplay(item);
  const pages = normalizeRange(item.pages);
  const j = journal ? `<i>${esc(journal)}</i>` : '';
  const y = item.year ? `<b>${esc(item.year)}</b>` : '';
  const vol = item.volume ? ((style==='nature' || style==='science') ? `<b>${esc(item.volume)}</b>` : `<i>${esc(item.volume)}</i>`) : '';
  const p = pages ? esc(pages) : '';
  let html = '';
  if(style==='nature'){
    html = [auth ? sentenceEnd(auth).trim() : '', title, j, vol ? vol + ',' : '', p, item.year ? `(${esc(item.year)}).` : '']
      .filter(Boolean).join(' ').replace(/\s+,/g, ',').trim();
  }else if(style==='science'){
    html = [auth ? auth + ',' : '', title, j, vol ? vol + ',' : '', p, item.year ? `(${esc(item.year)}).` : '']
      .filter(Boolean).join(' ').replace(/\s+,/g, ',').trim();
  }else if(style==='rsc'){
    html = auth ? auth + ', ' : ''; if(title) html += title + ' ';
    html += [j, y, vol, p].filter(Boolean).join(', '); html = html.trim().replace(/,$/, '') + '.';
  }else if(style==='csj'){
    html = auth ? auth + ', ' : ''; if(title) html += title + ' ';
    html += [j, y].filter(Boolean).join(' ');
    if(vol) html += (html ? ', ' : '') + vol; if(p) html += (html ? ', ' : '') + p;
    html = html.trim().replace(/,$/, '') + '.';
  }else if(style==='gdch'){
    html = auth ? auth + ', ' : ''; if(title) html += '&ldquo;' + title.replace(/\.$/,'') + '&rdquo;, ';
    html += [j, y].filter(Boolean).join(' ');
    if(vol) html += (html ? ', ' : '') + vol; if(p) html += (html ? ', ' : '') + p;
    html = html.trim().replace(/,$/, '') + '.';
  }else{
    html = [auth ? sentenceEnd(auth).trim() : '', title, j, y].filter(Boolean).join(' ');
    if(vol) html += (html ? ', ' : '') + vol; if(p) html += (html ? ', ' : '') + p;
    html = html.trim().replace(/,$/, '') + '.';
  }
  if(opts.includeUrl !== false && item.doi){
    const doi = esc(item.doi);
    html += ` <a href="https://doi.org/${doi}">https://doi.org/${doi}</a>`;
  }
  return html;
}

/* ================================================================
   i18n (JA / EN)
================================================================ */
var I18N = {
  ja: {
    notLoaded:'未読み込み', nRefs:function(n){return n+' 件の文献';}, nRefsCached:function(n){return n+' 件の文献（前回）';},
    searchPh:'タイトル・著者・雑誌・DOI で検索…', loadBtn:'ライブラリ', loadTitle:'library.json を読み込む',
    styleLabel:'スタイル', collLabel:'コレクション', allColl:'すべてのコレクション',
    incTitle:'タイトル', incUrl:'DOI/URL', numberLabel:'番号ーーー', superOpt:'上付き ¹',
    refreshBtn:'文献リストを更新', refreshTitle:'本文の番号と末尾の文献リストを再同期します',
    insertBtn:'挿入', fullBtn:'全文', copyBtn:'コピー',
    insertTitle:'番号を本文に挿入し、末尾リストと連動', fullTitle:'整形済みの引用文をそのまま挿入',
    count:function(n,m){return n+' / '+m+' 件';},
    emptyLoad:'まず「ライブラリ」ボタンから library.json を読み込んでください。（Paper Library の保存フォルダ内、または「エクスポート → ライブラリ全体 → JSON」）',
    moreItems:function(n){return '上位 '+n+' 件を表示（絞り込んでください）';}, noTitle:'(無題)',
    loaded:'ライブラリを読み込みました', loadFail:function(e){return '読み込み失敗: '+e;},
    inserted:'引用を挿入しました', insertFail:function(e){return '挿入に失敗: '+e;},
    updated:'文献リストを更新しました', updateFail:function(e){return '更新に失敗: '+e;},
    copied:'引用をコピーしました', copyFail:'コピーできませんでした',
    wordOnly:'Word 上でのみ挿入できます（プレビュー環境では不可）', wordOnlyUpdate:'Word 上でのみ動作します',
    badFormat:'library.json の形式を認識できません', noCites:'（引用がありません）', notFound:'(ライブラリに見つかりません)',
  },
  en: {
    notLoaded:'Not loaded', nRefs:function(n){return n+' references';}, nRefsCached:function(n){return n+' references (cached)';},
    searchPh:'Search title, author, journal, DOI…', loadBtn:'Library', loadTitle:'Load library.json',
    styleLabel:'Style', collLabel:'Collection', allColl:'All collections',
    incTitle:'Title', incUrl:'DOI/URL', numberLabel:'Number', superOpt:'Superscript ¹',
    refreshBtn:'Update bibliography', refreshTitle:'Re-sync the in-text numbers and the reference list',
    insertBtn:'Insert', fullBtn:'Full text', copyBtn:'Copy',
    insertTitle:'Insert a number in the text, linked to the reference list', fullTitle:'Insert the fully formatted citation as text',
    count:function(n,m){return n+' / '+m;},
    emptyLoad:'Load library.json with the “Library” button. (It is in your Paper Library folder, or export via Export → Whole library → JSON.)',
    moreItems:function(n){return 'Showing top '+n+' (refine your search)';}, noTitle:'(untitled)',
    loaded:'Library loaded', loadFail:function(e){return 'Load failed: '+e;},
    inserted:'Citation inserted', insertFail:function(e){return 'Insert failed: '+e;},
    updated:'Bibliography updated', updateFail:function(e){return 'Update failed: '+e;},
    copied:'Citation copied', copyFail:'Could not copy',
    wordOnly:'Only available inside Word', wordOnlyUpdate:'Only works inside Word',
    badFormat:'Unrecognized library.json format', noCites:'(no citations)', notFound:'(not found in library)',
  }
};
var LANG = 'ja';
function tr(k){ var a=[].slice.call(arguments,1); var v=I18N[LANG][k]; return typeof v==='function' ? v.apply(null,a) : v; }

/* ================================================================
   Add-in state + UI
================================================================ */
var $ = (s)=>document.querySelector(s);
var STATE = { items: [], collections: [], cached:false };
var PREFS = { style:'acs', includeTitle:false, includeUrl:false, marker:'bracket' };
var officeReady = false;
var LS_LIB = 'plWordAddin.library';
var LS_PREFS = 'plWordAddin.prefs';
var LS_LANG = 'plWordAddin.lang';
// inserted content defaults to Times New Roman 10.5pt
var INS_FONT = "Times New Roman", INS_SIZE = 10.5;

function toast(msg, isErr){
  var el = $('#toast'); el.textContent = msg;
  el.className = 'toast show' + (isErr ? ' err' : '');
  clearTimeout(toast._t); toast._t = setTimeout(function(){ el.className = 'toast'; }, 2600);
}
function collById(id){ return STATE.collections.find(function(c){ return c.id===id; }); }
function buildCollOptions(){
  var sel = $('#coll');
  var byParent = {};
  STATE.collections.forEach(function(c){ (byParent[c.parent||''] = byParent[c.parent||''] || []).push(c); });
  var opts = ['<option value="">'+esc(tr('allColl'))+'</option>'];
  (function walk(parent, depth){
    (byParent[parent]||[]).sort(function(a,b){ return a.name.localeCompare(b.name,'ja'); }).forEach(function(c){
      opts.push('<option value="'+esc(c.id)+'">'+ '　'.repeat(depth) + esc(c.name) +'</option>');
      walk(c.id, depth+1);
    });
  })('', 0);
  sel.innerHTML = opts.join('');
}
function updateLibInfo(){
  var el = $('#libInfo'); if(!el) return;
  if(!STATE.items.length){ el.textContent = tr('notLoaded'); return; }
  el.textContent = STATE.cached ? tr('nRefsCached', STATE.items.length) : tr('nRefs', STATE.items.length);
}
function loadLibraryData(data){
  var items = Array.isArray(data) ? data : (data && Array.isArray(data.items) ? data.items : null);
  if(!items) throw new Error(tr('badFormat'));
  STATE.items = items; STATE.cached = false;
  STATE.collections = (data && Array.isArray(data.collections)) ? data.collections : [];
  buildCollOptions();
  updateLibInfo();
  try{ localStorage.setItem(LS_LIB, JSON.stringify({items:STATE.items, collections:STATE.collections})); }catch(e){ /* too big for LS? keep in memory */ }
  render();
}
function currentOpts(){ return { style: $('#style').value, includeTitle: $('#incTitle').checked, includeUrl: $('#incUrl').checked, authorScope:'all' }; }
function savePrefs(){
  PREFS = { style: $('#style').value, includeTitle: $('#incTitle').checked, includeUrl: $('#incUrl').checked, marker: $('#markerStyle').value };
  try{ localStorage.setItem(LS_PREFS, JSON.stringify(PREFS)); }catch(e){}
}
function authorsShort(authors){ return (authors||[]).map(function(a){ return a.family || a.given; }).filter(Boolean).join('; '); }
function itemText(it){
  return [it.title, (it.authors||[]).map(function(a){ return (a.family||'')+' '+(a.given||''); }).join(' '),
    it.journal, it.journalAbbr, it.year, it.doi, it.citekey, (it.tags||[]).join(' ')].join(' ').toLowerCase();
}
function render(){
  var box = $('#results');
  if(!STATE.items.length){
    box.innerHTML = '<div class="empty">'+esc(tr('emptyLoad'))+'</div>';
    $('#count').textContent = ''; return;
  }
  var q = $('#q').value.trim().toLowerCase();
  var terms = q ? q.split(/\s+/) : [];
  var coll = $('#coll').value;
  var list = STATE.items.filter(function(it){
    if(coll && (it.collections||[]).indexOf(coll) < 0) return false;
    if(!terms.length) return true;
    var hay = itemText(it);
    return terms.every(function(t){ return hay.indexOf(t) >= 0; });
  });
  $('#count').textContent = tr('count', list.length, STATE.items.length);
  list.sort(function(a,b){ return String(b.year||'').localeCompare(String(a.year||'')); });
  var shown = list.slice(0, 200);
  box.innerHTML = shown.map(function(it, i){
    var meta = [ journalDisplay(it) ? '<span class="journal">'+esc(journalDisplay(it))+'</span>' : '',
                 it.year ? '<span>'+esc(it.year)+'</span>' : '' ].filter(Boolean).join('');
    return '<div class="card">'
      + '<div class="ct">'+esc(it.title||tr('noTitle'))+'</div>'
      + '<div class="cau">'+esc(authorsShort(it.authors))+'</div>'
      + '<div class="cmeta">'+meta+'</div>'
      + '<div class="acts">'
      +   '<button class="btn" data-num="'+i+'" title="'+esc(tr('insertTitle'))+'">'+esc(tr('insertBtn'))+'</button>'
      +   '<button class="btn ghost" data-ins="'+i+'" title="'+esc(tr('fullTitle'))+'">'+esc(tr('fullBtn'))+'</button>'
      +   '<button class="btn ghost" data-copy="'+i+'">'+esc(tr('copyBtn'))+'</button>'
      + '</div>'
      + '</div>';
  }).join('') + (list.length>shown.length ? '<div class="empty">'+esc(tr('moreItems', shown.length))+'</div>' : '');
  box.__list = shown;
}

/* ---- full-text insertion (Times New Roman 10.5pt) ---- */
async function insertCitation(it){
  if(!(officeReady && window.Office && Office.context && Office.context.document)){ toast(tr('wordOnly'), true); return; }
  var inner = itemToCitationHtml(it, currentOpts());
  var html = '<span style="font-family:\'Times New Roman\',serif;font-size:10.5pt;">' + inner + '</span>';
  Office.context.document.setSelectedDataAsync(html, { coercionType: Office.CoercionType.Html }, function(res){
    if(res.status === Office.AsyncResultStatus.Succeeded) toast(tr('inserted'));
    else toast(tr('insertFail', res.error && res.error.message), true);
  });
}
async function copyCitation(it){
  var html = itemToCitationHtml(it, currentOpts());
  var tmp = document.createElement('div'); tmp.innerHTML = html;
  var text = (tmp.textContent||'').replace(/\s+/g,' ').trim();
  try{
    if(window.ClipboardItem && navigator.clipboard && navigator.clipboard.write){
      await navigator.clipboard.write([new ClipboardItem({
        'text/html': new Blob([html], {type:'text/html'}),
        'text/plain': new Blob([text], {type:'text/plain'}),
      })]);
    } else { await navigator.clipboard.writeText(text); }
    toast(tr('copied'));
  }catch(e){ toast(tr('copyFail'), true); }
}

/* ================================================================
   Numbered citations [1] + auto-linked bibliography.
   Each in-text citation is a hidden Word content control tagged
   "PLCITE:<itemId>"; the bibliography is one control tagged "PLBIB".
================================================================ */
var CITE_TAG = 'PLCITE:';
var BIB_TAG = 'PLBIB';
// in-text marker text; bibliography number label matches the same style
function markerText(n){ return PREFS.marker === 'super' ? String(n) : '[' + n + ']'; }
function bibLabel(n){ return PREFS.marker === 'super' ? (n + '.') : ('[' + n + ']'); }
function assignNumbers(idsInOrder){
  var order = [], numById = {};
  idsInOrder.forEach(function(id){ if(!(id in numById)){ order.push(id); numById[id] = order.length; } });
  return { order: order, numById: numById };
}
// hanging-indent paragraphs, Times New Roman 10.5pt, number floating at the left
function buildBibliographyHtml(items, opts){
  if(!items.length) return '';
  var base = "font-family:'Times New Roman',serif;font-size:10.5pt;margin:0pt 0pt 6pt 36pt;text-indent:-36pt;";
  return items.map(function(it, i){
    var body = it ? itemToCitationHtml(it, opts) : esc(tr('notFound'));
    return '<p style="' + base + '">' + esc(bibLabel(i + 1)) + '&#9;' + body + '</p>';
  }).join('');
}
function applyInsertFont(range, superscript){
  range.font.name = INS_FONT; range.font.size = INS_SIZE;
  range.font.superscript = !!superscript;
}
function wordReady(){ return officeReady && window.Word && typeof Word.run === 'function'; }

async function insertCitationNumber(it){
  if(!wordReady()){ toast(tr('wordOnly'), true); return; }
  try{
    await Word.run(async function(context){
      var sel = context.document.getSelection();
      var r = sel.insertText(markerText(1), 'Replace'); // placeholder number; refresh fixes it
      var cc = r.insertContentControl();
      cc.tag = CITE_TAG + it.id;
      cc.title = 'Paper Library citation';
      cc.appearance = 'Hidden';
      applyInsertFont(r, PREFS.marker === 'super');
      await context.sync();
    });
    await refreshCitations({ silent: true });
    toast(tr('inserted'));
  }catch(e){ console.error(e); toast(tr('insertFail', e && e.message), true); }
}

async function refreshCitations(o){
  o = o || {};
  if(!wordReady()){ if(!o.silent) toast(tr('wordOnlyUpdate'), true); return; }
  var opts = currentOpts();
  try{
    await Word.run(async function(context){
      var ccs = context.document.body.contentControls;
      ccs.load('items/tag');
      await context.sync();

      var cites = ccs.items.filter(function(c){ return (c.tag || '').indexOf(CITE_TAG) === 0; });
      var ids = cites.map(function(c){ return c.tag.slice(CITE_TAG.length); });
      var num = assignNumbers(ids);
      var sup = (PREFS.marker === 'super');

      cites.forEach(function(c){
        var n = num.numById[c.tag.slice(CITE_TAG.length)];
        var r = c.insertText(markerText(n), 'Replace');
        applyInsertFont(r, sup);
      });

      var items = num.order.map(function(id){
        var f = null; STATE.items.forEach(function(x){ if(x.id === id) f = x; }); return f;
      });
      var bib = null;
      ccs.items.forEach(function(c){ if((c.tag || '') === BIB_TAG) bib = c; });
      if(!bib){
        var p = context.document.body.insertParagraph('', 'End');
        bib = p.insertContentControl();
        bib.tag = BIB_TAG;
        bib.title = 'Paper Library bibliography';
        bib.appearance = 'Hidden';
      }
      var html = buildBibliographyHtml(items, opts);
      if(html) bib.insertHtml(html, 'Replace');
      else bib.insertText(tr('noCites'), 'Replace');
      bib.font.name = INS_FONT; bib.font.size = INS_SIZE;
      await context.sync();
    });
    if(!o.silent) toast(tr('updated'));
  }catch(e){ console.error(e); toast(tr('updateFail', e && e.message), true); }
}

/* ---- events ---- */
$('#btnLoad').addEventListener('click', function(){ $('#file').click(); });
$('#file').addEventListener('change', function(e){
  var f = e.target.files[0]; e.target.value = '';
  if(!f) return;
  var r = new FileReader();
  r.onload = function(){ try{ loadLibraryData(JSON.parse(r.result)); toast(tr('loaded')); }
    catch(err){ toast(tr('loadFail', err.message), true); } };
  r.readAsText(f);
});
$('#q').addEventListener('input', render);
$('#coll').addEventListener('change', render);
$('#style').addEventListener('change', function(){ savePrefs(); render(); });
$('#incTitle').addEventListener('change', function(){ savePrefs(); render(); });
$('#incUrl').addEventListener('change', function(){ savePrefs(); render(); });
$('#markerStyle').addEventListener('change', function(){ savePrefs(); refreshCitations({ silent: true }); });
$('#btnRefresh').addEventListener('click', function(){ refreshCitations(); });
$('#btnLang').addEventListener('click', function(){ setLang(LANG === 'ja' ? 'en' : 'ja'); });
$('#results').addEventListener('click', function(e){
  var num = e.target.closest('[data-num]'), ins = e.target.closest('[data-ins]'), cp = e.target.closest('[data-copy]');
  var list = $('#results').__list || [];
  if(num){ var it0 = list[+num.dataset.num]; if(it0) insertCitationNumber(it0); }
  else if(ins){ var it = list[+ins.dataset.ins]; if(it) insertCitation(it); }
  else if(cp){ var it2 = list[+cp.dataset.copy]; if(it2) copyCitation(it2); }
});

/* ---- i18n apply / language ---- */
function applyI18n(){
  document.querySelectorAll('[data-i18n]').forEach(function(el){ var v = I18N[LANG][el.dataset.i18n]; if(typeof v === 'string') el.textContent = v; });
  document.querySelectorAll('[data-i18n-ph]').forEach(function(el){ var v = I18N[LANG][el.dataset.i18nPh]; if(typeof v === 'string') el.placeholder = v; });
  document.querySelectorAll('[data-i18n-title]').forEach(function(el){ var v = I18N[LANG][el.dataset.i18nTitle]; if(typeof v === 'string') el.title = v; });
  $('#btnLang').textContent = (LANG === 'ja') ? 'EN' : '日本語';
  document.documentElement.lang = LANG;
  if(STATE.collections.length) buildCollOptions();
  updateLibInfo();
  render();
}
function setLang(l){ LANG = l; try{ localStorage.setItem(LS_LANG, l); }catch(e){} applyI18n(); }

/* ---- startup: restore prefs + cached library ---- */
function restore(){
  try{ LANG = localStorage.getItem(LS_LANG) || 'ja'; }catch(e){ LANG = 'ja'; }
  if(LANG !== 'en' && LANG !== 'ja') LANG = 'ja';
  try{ Object.assign(PREFS, JSON.parse(localStorage.getItem(LS_PREFS)||'{}')); }catch(e){}
  $('#style').value = PREFS.style || 'acs';
  $('#incTitle').checked = !!PREFS.includeTitle;
  $('#incUrl').checked = !!PREFS.includeUrl;
  $('#markerStyle').value = PREFS.marker || 'bracket';
  try{
    var cached = JSON.parse(localStorage.getItem(LS_LIB)||'null');
    if(cached && cached.items){ STATE.items = cached.items; STATE.collections = cached.collections||[]; STATE.cached = true; }
  }catch(e){}
  applyI18n();
}
restore();

if(window.Office && Office.onReady){
  Office.onReady(function(info){ officeReady = !!(info && info.host); });
} else {
  officeReady = false;
}
</script>
